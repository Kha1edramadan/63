name: IGYM — Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "platform-tools" 2>/dev/null || true

      - name: Create env files
        run: |
          touch .env
          touch .env.example

      - name: Fix KSP source sets
        run: echo "android.disallowKotlinSourceSets=false" >> gradle.properties

      - name: Generate debug keystore
        run: |
          keytool -genkeypair -v \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=IGYM Debug,O=IGYM,C=EG"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.3.1'

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version=9.3.1 --distribution-type=bin

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: igym-v3-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Print APK info
        run: |
          echo "=== IGYM V3 Build Complete ==="
          find app/build/outputs/apk/debug -name "*.apk" -exec ls -lh {} \;
