# ═══════════════════════════════════════════════════════════════
#  iGYM — GitHub Actions CI
# ═══════════════════════════════════════════════════════════════

name: iGYM — Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:

      # ── 1. كود ─────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Java 21 ─────────────────────────────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # ── 3. Gradle 9.3.1 مباشرة ─────────────────────────────────
      #   يتجنب مشكلة gradle-wrapper.jar مش موجود في الـ zip
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.3.1"

      # ── 4. .env ─────────────────────────────────────────────────
      - name: Create .env file
        run: cp .env.example .env

      # ── 5. debug.keystore ──────────────────────────────────────
      - name: Generate debug keystore
        run: |
          keytool -genkey -v \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            -storetype PKCS12

      # ── 6. بناء ────────────────────────────────────────────────
      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.workers.max=2"

      # ── 7. رفع الـ APK ─────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: igym-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
          if-no-files-found: error
